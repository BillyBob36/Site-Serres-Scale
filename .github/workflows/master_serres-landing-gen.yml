# Déploiement App Service (Node 22 + startup.sh) — build Next.js standalone dans landing-generator/, ZIP → wwwroot.
# Secrets OIDC créés par le Centre de déploiement Azure (noms AZUREAPPSERVICE_*).

name: Build and deploy Node.js app to Azure Web App - serres-landing-gen

on:
  push:
    branches:
      - master
    paths:
      - "landing-generator/**"
      - ".github/workflows/master_serres-landing-gen.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: landing-generator/package-lock.json

      - name: npm ci, Prisma, Next build
        working-directory: landing-generator
        env:
          DATABASE_URL: file:/tmp/ci-placeholder.db
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: ZIP standalone pour Azure
        working-directory: landing-generator
        run: |
          cp startup.sh init-db.js .next-build/standalone/
          cd .next-build/standalone
          zip -r ../app.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: landing-generator/.next-build/app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B8FD2E28D6A242049066C2BF8A7505E1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5112DD1FC3A048D4A5326DA97BADF2A1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_53BC0587688342D781E4638915BF68BF }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "serres-landing-gen"
          slot-name: "Production"
          package: app.zip
